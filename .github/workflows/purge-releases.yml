name: Purge binary releases

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  purge:
    if: github.event.head_commit.message == 'Purge binary releases'
    runs-on: ubuntu-latest
    steps:
      - name: Delete all releases and binary assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release list --limit 100 --json tagName --jq '.[].tagName' | while IFS= read -r tag; do
            gh release delete "$tag" --yes --cleanup-tag=false
          done
